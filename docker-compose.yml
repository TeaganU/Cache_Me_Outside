services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      MONGO_URI: mongodb+srv://teagan:UfOz4JCXTLScmRA6@cachemeoutside.rawmv9i.mongodb.net/?appName=CacheMeOutside
      JWT_SECRET: cache_me_outside_super_secret_2026
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app/server
      - server_node_modules:/app/server/node_modules

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_PROXY_TARGET: http://server:4000
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app/client
      - client_node_modules:/app/client/node_modules

volumes:
  mongo_data:
  server_node_modules:
  client_node_modules: